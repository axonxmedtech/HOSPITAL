# Staging profile — used when SPRING_PROFILES_ACTIVE=staging
# In-memory cache; avoids any Redis dependency issues on staging
spring.cache.type=simple

# Keep the session open during request serialization as a safety net
# for any lazy-loaded associations not covered by JOIN FETCH queries
spring.jpa.open-in-view=true

# Verbose logging to diagnose issues
logging.level.com.hms=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
