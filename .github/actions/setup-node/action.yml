name: Setup Node.js
description: Install Node.js and run npm ci in a given working directory

inputs:
  node-version:
    description: Node.js version to use
    default: '22'
  working-directory:
    description: Directory containing package-lock.json
    default: frontend

runs:
  using: composite
  steps:
    # Pin to SHA in production: https://github.com/actions/setup-node/releases
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci
