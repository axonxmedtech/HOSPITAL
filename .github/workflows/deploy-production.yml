# ─────────────────────────────────────────────────────────────────────────────
# Deploy — Production
#
# Triggers only when the CI workflow completes successfully on the main branch.
# The GitHub "production" Environment approval gate (required reviewers, wait
# timer) provides a human checkpoint before any code reaches production.
#
# Auto-rollback is enabled: if the post-deploy health check fails, the service
# is automatically reverted to the previously deployed commit, rebuilt, and
# restarted. The job still exits with failure so the team is alerted.
#
# Optional Slack notifications are sent on every deployment outcome.
#
# GitHub Variables  (Actions Variables or scoped to production environment):
#   PRODUCTION_SSH_HOST     Hostname or IP of the production server
#   PRODUCTION_SSH_PORT     SSH port                          (default: 22)
#   PRODUCTION_HEALTH_PORT  Spring Boot port                  (default: 8080)
#   PRODUCTION_APP_URL      Public URL shown on the Environments page
#
# GitHub Secrets  (scoped to the production environment):
#   PRODUCTION_SSH_KEY       PEM private key for the deploy user
#   PRODUCTION_SLACK_WEBHOOK (optional) Slack incoming webhook URL
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy — Production

on:
  workflow_run:
    # Only fires after the CI workflow — tests, security scans, quality gate
    # must all pass before this workflow is even considered.
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:

  deploy:
    # Hard gate: only proceed when CI succeeded.
    if: github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/_deploy.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      environment: production
      repo_path: /var/www/hms/production/repo_prod
      service_name: hms-production
      git_branch: main
      ssh_host: ${{ vars.PRODUCTION_SSH_HOST }}
      ssh_port: ${{ vars.PRODUCTION_SSH_PORT || '22' }}
      health_port: ${{ vars.PRODUCTION_HEALTH_PORT || '8080' }}
      app_url: ${{ vars.PRODUCTION_APP_URL }}
      enable_rollback: true
      notify_slack: true
    secrets:
      ssh_key: ${{ secrets.PRODUCTION_SSH_KEY }}
      slack_webhook: ${{ secrets.PRODUCTION_SLACK_WEBHOOK }}
