# ─────────────────────────────────────────────────────────────────────────────
# Deploy — Staging
#
# Triggers only when the CI workflow completes successfully on the staging
# branch. No rollback is enabled — failed staging builds are simply re-deployed
# after a fix, keeping the pipeline fast and simple.
#
# Protected by GitHub "staging" Environment rules
# (Settings → Environments → staging): configure protection rules, required
# reviewers, and wait timers there.
#
# GitHub Variables  (Actions Variables or scoped to staging environment):
#   STAGING_SSH_HOST     Hostname or IP of the staging server
#   STAGING_SSH_PORT     SSH port                          (default: 22)
#   STAGING_HEALTH_PORT  Spring Boot port to health-check  (default: 8080)
#   STAGING_APP_URL      Public URL shown on the Environments page
#
# GitHub Secrets  (scoped to the staging environment):
#   STAGING_SSH_KEY      PEM private key for the deploy user
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy — Staging

on:
  workflow_run:
    # Only fires after the CI workflow — tests, security scans must pass first.
    workflows: ["CI"]
    types: [completed]
    branches: [staging]

permissions:
  contents: read

jobs:

  deploy:
    # Hard gate: skip if CI did not pass (e.g. cancelled, failed).
    if: github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/_deploy.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      environment: staging
      repo_path: /var/www/hms/staging/repo_stage
      service_name: hms-staging
      git_branch: staging
      ssh_host: ${{ vars.STAGING_SSH_HOST }}
      ssh_port: ${{ vars.STAGING_SSH_PORT || '22' }}
      health_port: ${{ vars.STAGING_HEALTH_PORT || '8080' }}
      app_url: ${{ vars.STAGING_APP_URL }}
      enable_rollback: false
      notify_slack: false
    secrets:
      ssh_key: ${{ secrets.STAGING_SSH_KEY }}
