name: Security Scans

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '22'
      java-version:
        type: string
        default: '17'
    secrets:
      nvd_api_key:
        required: false

jobs:
  # ── 1. CodeQL static analysis ─────────────────────────────────────────────
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            needs-java: true
          - language: javascript-typescript
            needs-java: false

    steps:
      # Pin to SHA in production: https://github.com/actions/checkout/releases
      - uses: actions/checkout@v4

      - name: Setup Java (Java/Kotlin only)
        if: matrix.needs-java
        uses: ./.github/actions/setup-java
        with:
          java-version: ${{ inputs.java-version }}

      # Pin to SHA in production: https://github.com/github/codeql-action/releases
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # Pin to SHA in production: https://github.com/github/codeql-action/releases
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Pin to SHA in production: https://github.com/github/codeql-action/releases
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
          upload: always

  # ── 2. Dependency review (PRs only) ───────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      # Pin to SHA in production: https://github.com/actions/checkout/releases
      - uses: actions/checkout@v4

      # Pin to SHA in production: https://github.com/actions/dependency-review-action/releases
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.1

  # ── 3. Secret scanning with Gitleaks ──────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      # Pin to SHA in production: https://github.com/actions/checkout/releases
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --exit-code 1 \
            --redact \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --log-level warn

      - name: Upload SARIF to Security tab
        if: always()
        continue-on-error: true
        # Pin to SHA in production: https://github.com/github/codeql-action/releases
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

      - name: Upload Gitleaks report artifact
        if: always()
        # Pin to SHA in production: https://github.com/actions/upload-artifact/releases
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report-${{ github.sha }}
          path: gitleaks-report.sarif
          retention-days: 30
          if-no-files-found: warn

  # ── 4. npm audit ──────────────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      # Pin to SHA in production: https://github.com/actions/checkout/releases
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: frontend

      - name: Generate audit JSON report
        run: npm audit --json > npm-audit-report.json 2>&1 || true

      - name: Enforce high-severity gate
        run: npm audit --audit-level=high

      - name: Upload npm audit report
        if: always()
        # Pin to SHA in production: https://github.com/actions/upload-artifact/releases
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report-${{ github.sha }}
          path: frontend/npm-audit-report.json
          retention-days: 30
          if-no-files-found: warn

  # ── 5. OWASP Dependency-Check ─────────────────────────────────────────────
  owasp-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      # Pin to SHA in production: https://github.com/actions/checkout/releases
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: ./.github/actions/setup-java
        with:
          java-version: ${{ inputs.java-version }}

      - name: Cache OWASP NVD data
        # Pin to SHA in production: https://github.com/actions/cache/releases
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.nvd_api_key }}
          JAVA_OPTS: -Xmx2g
        run: >
          mvn -B
          org.owasp:dependency-check-maven:9.0.9:check
          -DfailBuildOnCVSS=7
          -DskipTestScope=true
          -Dformat=ALL
          -DoutputDirectory=target/owasp-report
          -DnvdApiKey="${NVD_API_KEY:-}"
          -DsuppressionFile=../.github/owasp-suppressions.xml
          --no-transfer-progress

      - name: Upload OWASP report
        if: always()
        # Pin to SHA in production: https://github.com/actions/upload-artifact/releases
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-${{ github.sha }}
          path: backend/target/owasp-report/
          retention-days: 90
          if-no-files-found: warn
