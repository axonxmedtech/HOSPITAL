# ────────────────────────────────────────────
# CI — Hospital Management System
# Orchestrator: delegates to reusable workflows
#
# build-frontend ──┐
# build-backend  ──┤──► sonar (quality gate)
# security       ──┘
# ────────────────────────────────────────────
#
# GitHub Variables  (Settings → Variables → Actions):
#   NODE_VERSION         Node.js version              (default: 22)
#   JAVA_VERSION         JDK version                  (default: 17)
#   VITE_API_BASE_URL    Backend API URL baked into the frontend bundle
#   SONAR_ORGANIZATION   SonarCloud organisation key  (e.g. axonxmedtech)
#   SONAR_PROJECT_KEY    SonarCloud project key       (e.g. axonxmedtech_HOSPITAL)
#
# GitHub Secrets  (Settings → Secrets → Actions):
#   SONAR_TOKEN   SonarCloud user token
#   NVD_API_KEY   (optional) NIST NVD key — speeds up OWASP scans
# ────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

# Cancel in-progress run for the same branch/PR when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions at the workflow level.
permissions:
  contents: read

jobs:

  # ── Frontend build, type-check, coverage ────────────────────────────────
  build-frontend:
    uses: ./.github/workflows/_build-frontend.yml
    with:
      node-version: ${{ vars.NODE_VERSION || '22' }}
      vite-api-base-url: ${{ vars.VITE_API_BASE_URL }}

  # ── Backend compile, test (JaCoCo), package ──────────────────────────────
  build-backend:
    uses: ./.github/workflows/_build-backend.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
    with:
      java-version: ${{ vars.JAVA_VERSION || '17' }}

  # ── Security: CodeQL, dependency-review, Gitleaks, npm audit, OWASP ─────
  security:
    uses: ./.github/workflows/_security.yml
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    with:
      node-version: ${{ vars.NODE_VERSION || '22' }}
      java-version: ${{ vars.JAVA_VERSION || '17' }}
    secrets: inherit

  # ── SonarCloud quality gate ───────────────────────────────────────────────
  # Direct job (not reusable) — needs artifacts produced by build jobs.
  sonar:
    name: Quality — SonarCloud Analysis & Gate
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]

    # Skip on fork PRs — secrets unavailable in untrusted fork contexts.
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    permissions:
      contents: read
      pull-requests: write

    steps:
      # Pin to SHA in production: https://github.com/actions/checkout/releases
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: ./.github/actions/setup-java
        with:
          java-version: ${{ vars.JAVA_VERSION || '17' }}

      - name: Compile backend (bytecode for Sonar)
        run: mvn test-compile -q -f backend/pom.xml

      # Pin to SHA in production: https://github.com/actions/download-artifact/releases
      - name: Download JaCoCo coverage report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-xml-${{ github.sha }}
          path: backend/target/site/jacoco/

      # Pin to SHA in production: https://github.com/actions/download-artifact/releases
      - name: Download frontend LCOV coverage report
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-${{ github.sha }}
          path: frontend/coverage/
        continue-on-error: true

      # Pin to SHA in production: https://github.com/SonarSource/sonarqube-scan-action/releases
      - name: Run SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || vars.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=backend/src/main/java,frontend/src
            -Dsonar.tests=backend/src/test/java
            -Dsonar.java.binaries=backend/target/classes
            -Dsonar.java.source=${{ vars.JAVA_VERSION || '17' }}
            -Dsonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/target/surefire-reports/**,**/*.min.js
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.qualitygate.wait=true
