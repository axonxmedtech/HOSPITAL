name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
        description: GitHub Environment name (staging | production)
      repo_path:
        type: string
        required: true
        description: Absolute path to the git repo on the server
      service_name:
        type: string
        required: true
        description: systemd service name (e.g. hms-staging)
      git_branch:
        type: string
        required: true
        description: Branch to deploy (e.g. staging | main)
      ssh_host:
        type: string
        required: true
      ssh_port:
        type: string
        default: '22'
      health_port:
        type: string
        default: '8080'
      app_url:
        type: string
        default: ''
      enable_rollback:
        type: boolean
        default: false
      notify_slack:
        type: boolean
        default: false
    secrets:
      ssh_key:
        required: true
      ssh_user:
        required: false
      slack_webhook:
        required: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.app_url }}

    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false

    steps:
      # ── Deployment header ────────────────────────────────────────────────
      - name: Write deployment header
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Deployment — ${{ inputs.environment }}

          | Field | Value |
          | --- | --- |
          | Environment | \`${{ inputs.environment }}\` |
          | CI run | [${{ github.event.workflow_run.run_number }}](${{ github.event.workflow_run.html_url }}) |
          | Commit SHA | \`${{ github.sha }}\` |
          | Author | ${{ github.actor }} |
          | Started | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |
          EOF

      # ── SSH Connection Diagnostics ───────────────────────────────────────
      - name: SSH Connection Diagnostics
        run: |
          echo "=================== SSH DIAGNOSTICS ==================="
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Target Host: $SSH_HOST"
          echo "Target Port: $SSH_PORT"
          
          echo "Testing TCP connection to port $SSH_PORT..."
          if nc -zv -w 5 "$SSH_HOST" "$SSH_PORT" 2>&1; then
            echo "TCP connection to port $SSH_PORT succeeded!"
          else
            echo "WARNING: TCP connection to port $SSH_PORT timed out or was refused."
            echo "This indicates a network-level issue, firewall block (e.g. fail2ban), or VPS freeze."
          fi
          echo "======================================================="
        env:
          SSH_HOST: ${{ inputs.ssh_host || vars.HOST || vars.SSH_HOST || vars.STAGING_SSH_HOST || vars.PRODUCTION_SSH_HOST }}
          SSH_PORT: ${{ inputs.ssh_port || vars.PORT || vars.SSH_PORT || vars.STAGING_SSH_PORT || vars.PRODUCTION_SSH_PORT || '22' }}

      # ── Download Frontend Build ──────────────────────────────────────────
      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist

      # ── Download Backend JAR ─────────────────────────────────────────────
      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar-${{ github.sha }}
          path: backend/target

      # ── Pull latest code on VPS ──────────────────────────────────────────
      - name: Pull Code on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ inputs.ssh_host || vars.HOST || vars.SSH_HOST || vars.STAGING_SSH_HOST || vars.PRODUCTION_SSH_HOST }}
          username: ${{ inputs.ssh_user || vars.SSH_USER || vars.SSH_USERNAME || secrets.ssh_user || secrets.SSH_USER || secrets.SSH_USERNAME || 'deploy' }}
          key: ${{ secrets.ssh_key || secrets.SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.PRIVATE_KEY || secrets.STAGING_SSH_KEY || secrets.PRODUCTION_SSH_KEY || secrets.KEY }}
          port: ${{ inputs.ssh_port || vars.PORT || vars.SSH_PORT || vars.STAGING_SSH_PORT || vars.PRODUCTION_SSH_PORT || '22' }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            TS() { date -u '+%Y-%m-%dT%H:%M:%SZ'; }
            
            REPO="${{ inputs.repo_path || vars.DEPLOY_PATH }}"
            BRANCH="${{ inputs.git_branch || vars.BRANCH_NAME }}"
            
            echo "[$(TS)] Pulling latest code..."
            cd "$REPO"
            git fetch origin
            git reset --hard "origin/$BRANCH"
            git log -1 --oneline
            
            # Ensure build directories exist
            mkdir -p frontend/dist
            mkdir -p backend/target
            
            # Backup current build artifacts for rollback
            if [ "${{ inputs.enable_rollback }}" = "true" ]; then
              echo "[$(TS)] Backing up artifacts for rollback..."
              mkdir -p ../rollback_backup
              cp -f backend/target/*.jar ../rollback_backup/prev_backend.jar || true
              rm -rf ../rollback_backup/prev_frontend_dist
              cp -r frontend/dist ../rollback_backup/prev_frontend_dist || true
              PREV_SHA=$(git rev-parse HEAD)
              echo "$PREV_SHA" > ../rollback_backup/prev_sha.txt
            fi

      # ── Copy Frontend Build via SCP ──────────────────────────────────────
      - name: Copy Frontend Build via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ inputs.ssh_host || vars.HOST || vars.SSH_HOST || vars.STAGING_SSH_HOST || vars.PRODUCTION_SSH_HOST }}
          username: ${{ inputs.ssh_user || vars.SSH_USER || vars.SSH_USERNAME || secrets.ssh_user || secrets.SSH_USER || secrets.SSH_USERNAME || 'deploy' }}
          key: ${{ secrets.ssh_key || secrets.SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.PRIVATE_KEY || secrets.STAGING_SSH_KEY || secrets.PRODUCTION_SSH_KEY || secrets.KEY }}
          port: ${{ inputs.ssh_port || vars.PORT || vars.SSH_PORT || vars.STAGING_SSH_PORT || vars.PRODUCTION_SSH_PORT || '22' }}
          source: "frontend/dist/**"
          target: "${{ inputs.repo_path || vars.DEPLOY_PATH }}/frontend/dist"
          strip_components: 2

      # ── Copy Backend JAR via SCP ─────────────────────────────────────────
      - name: Copy Backend JAR via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ inputs.ssh_host || vars.HOST || vars.SSH_HOST || vars.STAGING_SSH_HOST || vars.PRODUCTION_SSH_HOST }}
          username: ${{ inputs.ssh_user || vars.SSH_USER || vars.SSH_USERNAME || secrets.ssh_user || secrets.SSH_USER || secrets.SSH_USERNAME || 'deploy' }}
          key: ${{ secrets.ssh_key || secrets.SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.PRIVATE_KEY || secrets.STAGING_SSH_KEY || secrets.PRODUCTION_SSH_KEY || secrets.KEY }}
          port: ${{ inputs.ssh_port || vars.PORT || vars.SSH_PORT || vars.STAGING_SSH_PORT || vars.PRODUCTION_SSH_PORT || '22' }}
          source: "backend/target/*.jar"
          target: "${{ inputs.repo_path || vars.DEPLOY_PATH }}/backend/target"
          strip_components: 2

      # ── Restart Service and Health Check ─────────────────────────────────
      - name: Restart Service and Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ inputs.ssh_host || vars.HOST || vars.SSH_HOST || vars.STAGING_SSH_HOST || vars.PRODUCTION_SSH_HOST }}
          username: ${{ inputs.ssh_user || vars.SSH_USER || vars.SSH_USERNAME || secrets.ssh_user || secrets.SSH_USER || secrets.SSH_USERNAME || 'deploy' }}
          key: ${{ secrets.ssh_key || secrets.SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.PRIVATE_KEY || secrets.STAGING_SSH_KEY || secrets.PRODUCTION_SSH_KEY || secrets.KEY }}
          port: ${{ inputs.ssh_port || vars.PORT || vars.SSH_PORT || vars.STAGING_SSH_PORT || vars.PRODUCTION_SSH_PORT || '22' }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            TS() { date -u '+%Y-%m-%dT%H:%M:%SZ'; }
            
            REPO="${{ inputs.repo_path || vars.DEPLOY_PATH }}"
            
            # Restart service
            echo "[$(TS)] Restarting ${{ inputs.service_name || vars.SERVICE_NAME }} ..."
            sudo systemctl restart "${{ inputs.service_name || vars.SERVICE_NAME }}"
            
            # Health check
            MAX=15
            DELAY=10
            URL="http://localhost:${{ inputs.health_port || vars.PORT || vars.STAGING_HEALTH_PORT || vars.PRODUCTION_HEALTH_PORT || '8080' }}/api/public/health"
            echo "[$(TS)] Health check: $URL"
            HEALTHY=false
            for i in $(seq 1 $MAX); do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || echo 000)
              echo "[$(TS)] Attempt $i/$MAX — HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                HEALTHY=true
                break
              fi
              sleep "$DELAY"
            done
            
            if $HEALTHY; then
              echo "[$(TS)] Service is healthy."
              exit 0
            fi
            
            # ── Health check failed ───────────────────────────────────────
            if [ "${{ inputs.enable_rollback }}" = "true" ]; then
              PREV_SHA=$(cat ../rollback_backup/prev_sha.txt || echo "")
              echo ""
              echo "============================================"
              echo "  HEALTH CHECK FAILED — INITIATING ROLLBACK"
              echo "  Rolling back to: $PREV_SHA"
              echo "============================================"
              cd "$REPO"
              git reset --hard "$PREV_SHA"
              
              # Restore backups
              echo "Restoring previous build artifacts..."
              cp -f ../rollback_backup/prev_backend.jar backend/target/hospital-management-system-1.0.0.jar || true
              rm -rf frontend/dist
              cp -r ../rollback_backup/prev_frontend_dist frontend/dist || true
              
              echo "Restarting service..."
              sudo systemctl restart "${{ inputs.service_name || vars.SERVICE_NAME }}"
              
              # Post-rollback health check
              ROLLBACK_HEALTHY=false
              for i in $(seq 1 $MAX); do
                STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || echo 000)
                echo "[$(TS)] Rollback health $i/$MAX — HTTP $STATUS"
                if [ "$STATUS" = "200" ]; then
                  ROLLBACK_HEALTHY=true
                  break
                fi
                sleep "$DELAY"
              done
              
              if $ROLLBACK_HEALTHY; then
                echo "[$(TS)] Rollback succeeded. Previous version is live."
              else
                echo "[$(TS)] Rollback health check also failed. Manual intervention required."
              fi
              echo "[$(TS)] Deployment FAILED — exiting with error."
              exit 1
            else
              echo "[$(TS)] Health check failed. Rollback disabled."
              echo "[$(TS)] Hint: check 'journalctl -u ${{ inputs.service_name || vars.SERVICE_NAME }} -n 100' on the server."
              exit 1
            fi

      # ── Collect service logs ─────────────────────────────────────────────
      - name: Collect service logs
        if: always()
        env:
          SSH_KEY: ${{ secrets.ssh_key || secrets.SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.PRIVATE_KEY || secrets.STAGING_SSH_KEY || secrets.PRODUCTION_SSH_KEY || secrets.KEY }}
          SSH_HOST: ${{ inputs.ssh_host || vars.HOST || vars.SSH_HOST || vars.STAGING_SSH_HOST || vars.PRODUCTION_SSH_HOST }}
          SSH_PORT: ${{ inputs.ssh_port || vars.PORT || vars.SSH_PORT || vars.STAGING_SSH_PORT || vars.PRODUCTION_SSH_PORT || '22' }}
          SSH_USER: ${{ inputs.ssh_user || vars.SSH_USER || vars.SSH_USERNAME || secrets.ssh_user || secrets.SSH_USER || secrets.SSH_USERNAME || 'deploy' }}
        run: |
          mkdir -p deployment-logs

          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "journalctl -u ${{ inputs.service_name || vars.SERVICE_NAME }} --since '30 minutes ago' --no-pager 2>&1" \
            > deployment-logs/service.log 2>&1 \
            || echo "[log collection failed]" > deployment-logs/service.log

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "cd ${{ inputs.repo_path || vars.DEPLOY_PATH }} && git log -1 --format='%H %s' 2>&1" \
            > deployment-logs/active-commit.txt 2>&1 \
            || echo "[commit collection failed]" > deployment-logs/active-commit.txt

          rm -f /tmp/deploy_key

      # ── Upload deployment logs ───────────────────────────────────────────
      - name: Upload deployment logs
        if: always()
        # Pin to SHA in production: https://github.com/actions/upload-artifact/releases
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.environment }}-deploy-logs-${{ github.run_id }}
          path: deployment-logs/
          retention-days: 90
          if-no-files-found: warn

      # ── Slack notification ───────────────────────────────────────────────
      - name: Notify Slack
        if: always() && inputs.notify_slack
        continue-on-error: true
        env:
          STATUS: ${{ job.status }}
        run: |
          if [ "$STATUS" = "success" ]; then
            ICON=":white_check_mark:"
          elif [ "$STATUS" = "failure" ]; then
            ICON=":x:"
          else
            ICON=":warning:"
          fi

          curl -sSf -X POST "${{ secrets.slack_webhook }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"${ICON} *${{ inputs.environment }}* deployment *${STATUS}*\",
              \"attachments\": [{
                \"color\": \"$([ \"$STATUS\" = \"success\" ] && echo good || echo danger)\",
                \"fields\": [
                  {\"title\": \"Environment\", \"value\": \"${{ inputs.environment }}\", \"short\": true},
                  {\"title\": \"Status\", \"value\": \"${STATUS}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"\`${{ github.sha }}\`\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\", \"short\": true}
                ]
              }]
            }"

      # ── Deployment result ────────────────────────────────────────────────
      - name: Write deployment result
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF

          ---

          | Result | Finished |
          | --- | --- |
          | ${{ job.status }} | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |
          EOF
